name: medora
description: "Medora - Home Medicine Cabinet Manager"
publish_to: 'none'

version: 0.0.9+9

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_slidable: ^4.0.3

  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.1.0

  # Backend
  supabase_flutter: ^2.9.0

  # Local Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # Camera & OCR
  camera: ^0.12.0
  google_mlkit_text_recognition: ^0.15.0

  # Image Picker
  image_picker: ^1.1.2

  # Security
  local_auth: ^2.3.0

  # Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0
  package_info_plus: ^8.2.1

  # Offline Mode
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0
  sqflite_common_ffi_web: ^1.1.1
  connectivity_plus: ^7.0.0
  path_provider: ^2.1.5
  path: ^1.9.1
  shared_preferences: ^2.3.5

  # Networking
  http: ^1.3.0

  # Export
  csv: ^7.2.0
  pdf: ^3.11.3
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.14
  freezed: ^3.2.5
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/medora_icon_pill.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/icon/medora_icon.png
    - assets/icon/medora_icon_pill.png
